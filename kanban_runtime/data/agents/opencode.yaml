name: opencode
display_name: "OpenCode"
version: "1.0"

invoke:
  command: opencode
  mcp_flag: "--mcp"
  info_flag: "--version"
  model_flag: "--model"

capabilities: [code, debugging, fullstack, testing]

models:
  - id: opencode-default
    context_window: 128000

protocol: mcp

auth:
  type: none
roles: [worker, test]
modes: [supervised, auto, headless]

reporting:
  heartbeat_interval: 30

chat_designer:
  prompt_flag: "-p"
  stdin: false
  output_format: "stdout"
  timeout_seconds: 180

task_command:
  prompt_file: ".kanban_task.md"
  args: ["run", ".kanban_task.md"]

# Handoff profile (P1-2)
owns: []
review_only: false
