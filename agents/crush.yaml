name: crush
display_name: "Crush (Charm)"
version: "1.0"

invoke:
  command: crush
  mcp_flag: ""
  info_flag: "--version"

capabilities: [code, refactoring, testing]

models:
  - id: default
    context_window: 128000

protocol: stdio

auth:
  type: none
roles: [worker]
modes: [supervised, auto]

reporting:
  heartbeat_interval: 30
