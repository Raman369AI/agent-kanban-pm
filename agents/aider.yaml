name: aider
display_name: "Aider"
version: "1.0"

invoke:
  command: aider
  mcp_flag: ""
  info_flag: "--version"

capabilities: [code, refactoring, git, testing]

models:
  - id: gpt-4o
    context_window: 128000

protocol: stdio

auth:
  type: none
roles: [worker]
modes: [supervised, auto]

reporting:
  heartbeat_interval: 30
