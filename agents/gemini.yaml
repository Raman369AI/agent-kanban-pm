name: gemini
display_name: "Gemini (Google)"
version: "1.0"

invoke:
  command: gemini
  mcp_flag: "--mcp"
  info_flag: "--version"

capabilities: [code, analysis, summarization, debugging, testing]

models:
  - id: gemini-2.5-pro
    context_window: 1000000

protocol: mcp

auth:
  type: none
roles: [worker]
modes: [supervised, auto, headless]

reporting:
  heartbeat_interval: 30
